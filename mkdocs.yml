# MkDocs configuration for the Workday Admin Guide static site.
# Builds the docs/ markdown into a searchable HTML site for GitHub Pages.

site_name: Workday Admin Guide
site_description: Workday HCM, Security, Integrations, Reporting, AI/Agents, and VNDLY reference (May 2026 / 26R1).

# IMPORTANT: set this to your real Cloudflare Pages URL once the project exists.
# Default Pages domain: https://<pages-project-name>.pages.dev/
# (Update if you set a custom domain.) This drives the absolute URLs in
# sitemap.xml, which is what Bing -- and therefore the Copilot public-website
# knowledge source -- crawls. Trailing slash required.
site_url: https://wp-docs-56b.pages.dev/

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.sections
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - tables
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.details

